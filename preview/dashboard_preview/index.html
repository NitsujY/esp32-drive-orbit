<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drive Orbit Dashboard Preview</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <div class="eyebrow">Orbital Driver View</div>
          <h1>Orb Sync Instrument Cluster</h1>
        </div>
        <label class="theme-picker">
          <span>Theme</span>
          <select id="theme-select">
            <option value="orbital_sync">Orbital Sync</option>
            <option value="aurora_grid">Aurora Grid</option>
            <option value="afterburn_glow">Afterburn Glow</option>
          </select>
        </label>
      </header>

      <section class="device-frame" id="frame">
        <div class="ambient-grid"></div>
        <div class="welcome-banner" id="welcome-banner">Ignition sync complete</div>
        <section class="status-rail" aria-label="Dashboard status">
          <div class="status-block">
            <span class="status-kicker">Session</span>
            <strong class="status-value" id="screen-label">Boot</strong>
          </div>
          <div class="status-block status-block-clock">
            <span class="status-kicker">Local Time</span>
            <strong class="clock-time" id="time">00:00</strong>
            <span class="clock-date" id="date">Tue 01 Apr</span>
          </div>
          <div class="status-pill" id="mode-pill">Cruise</div>
        </section>

        <section class="cluster-panel">
          <div class="cluster-header">
            <div>
              <div class="hero-label">Tach Ribbon</div>
              <div class="hero-note">segmented RPM display for cleaner color separation than the filled arc</div>
            </div>
            <div class="rpm-readout">
              <span class="mini-label">RPM</span>
              <strong id="rpm-value">0000</strong>
            </div>
          </div>

          <div class="tach-ribbon" id="tach-ribbon" aria-label="Segmented RPM tachometer"></div>

          <div class="speed-stage">
            <div class="speed-halo"></div>
            <div class="speed-orbit speed-orbit-outer"></div>
            <div class="speed-orbit speed-orbit-inner"></div>
            <div class="speed-center">
              <div class="hero-speed" id="speed">0</div>
              <div class="hero-unit">km/h</div>
            </div>
            <div class="speed-gloss"></div>
          </div>
        </section>

        <section class="bottom-strip">
          <article class="mini-card accent icon-card">
            <span class="mini-label">Mode</span>
            <strong id="mode-text">Cruise</strong>
          </article>
          <article class="mini-card icon-card">
            <span class="mini-label">Gear</span>
            <strong class="gear-token" id="gear">D1</strong>
          </article>
          <article class="mini-card icon-card">
            <span class="mini-label">Range</span>
            <div class="meter-meta">
              <strong id="range">280 km</strong>
              <div class="meter-bar" aria-hidden="true">
                <div class="meter-fill range-fill" id="range-fill"></div>
              </div>
            </div>
          </article>
          <article class="mini-card icon-card fuel-card">
            <span class="mini-label">Fuel</span>
            <div class="meter-meta">
              <strong id="fuel">78%</strong>
              <div class="meter-bar" aria-hidden="true">
                <div class="meter-fill fuel-fill" id="fuel-fill"></div>
              </div>
            </div>
          </article>
        </section>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
