<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drive Orbit Companion Preview</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <label class="mode-picker" for="state-select">
        <span>Orb State</span>
        <select id="state-select">
          <option value="auto">Auto cycle</option>
          <option value="idle">Idle</option>
          <option value="ready">Ready</option>
          <option value="aware">Aware</option>
          <option value="focus">Focus</option>
        </select>
      </label>

      <section class="orb-shell" id="orb-shell" aria-label="Orb companion preview">
        <div class="orb-screen">
          <div class="orb-noise"></div>
          <div class="orb-ring orb-ring-outer"></div>
          <div class="orb-ring orb-ring-inner"></div>
          <div class="orb-core" id="orb-core"></div>
          <div class="orb-face" id="orb-face">·</div>
          <div class="orb-label" id="orb-label">Idle</div>
          <div class="orb-subtitle" id="orb-subtitle">Waiting quietly for motion.</div>
          <div class="orb-pulse" id="orb-pulse">standby</div>
          <div class="orb-glow"></div>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
