<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Concept 6 — Glass Cockpit</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:linear-gradient(160deg,#0a1628,#0e1f3a);color:#eef5ff;font-family:-apple-system,'SF Pro Display','Segoe UI',sans-serif}
body{display:flex;align-items:center;justify-content:center}
.frame{width:100vw;height:100vh;overflow:hidden;padding:16px;display:flex;flex-direction:column;gap:10px}
.cards{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{background:rgba(255,255,255,.04);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(125,211,252,.12);border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;transition:box-shadow .4s}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(125,211,252,.2),transparent)}
.card-label{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:rgba(125,211,252,.5);margin-bottom:6px}
.card-value{font-size:68px;font-weight:500;line-height:1;letter-spacing:-3px}
.card--rpm .card-value{font-size:56px;color:#7dd3fc}
.card-unit{font-size:12px;letter-spacing:.2em;opacity:.35;margin-top:4px;text-transform:uppercase}
.bottom-strip{display:grid;grid-template-columns:1fr 2fr 1fr;background:rgba(255,255,255,.05);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(125,211,252,.08);border-radius:12px;padding:10px 16px;gap:8px;font-size:12px;align-items:center}
.cell{display:flex;flex-direction:column;gap:2px}
.cell-label{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:rgba(125,211,252,.4)}
.cell-val{font-weight:500}
.cell--center{text-align:center}
.cell--right{text-align:right}
.fuel-track{width:100%;height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;margin-top:3px}
.fuel-fill{height:100%;background:linear-gradient(90deg,#7dd3fc,#38bdf8);border-radius:2px;transition:width .3s}
.gear-badge{font-weight:600;font-size:16px;color:rgba(125,211,252,.7)}
.back-link{position:fixed;top:16px;left:16px;color:rgba(255,255,255,.3);text-decoration:none;font-size:13px;z-index:10}
.back-link:hover{color:#fff}
</style>
</head>
<body>
<a class="back-link" href="./index.html">&larr; All Concepts</a>
<div class="frame">
  <div class="cards">
    <div class="card card--speed">
      <span class="card-label">Speed</span>
      <span class="card-value" id="speed">0</span>
      <span class="card-unit">km/h</span>
    </div>
    <div class="card card--rpm">
      <span class="card-label">RPM</span>
      <span class="card-value" id="rpm">0</span>
      <span class="card-unit">rpm</span>
    </div>
  </div>
  <div class="bottom-strip">
    <div class="cell">
      <span class="cell-label">Gear</span>
      <span class="cell-val gear-badge" id="gear">D</span>
    </div>
    <div class="cell cell--center">
      <span class="cell-label">Fuel <span id="fuel-pct">0</span>% — <span id="range">0</span> km</span>
      <div class="fuel-track"><div class="fuel-fill" id="fuel-fill"></div></div>
    </div>
    <div class="cell cell--right">
      <span class="cell-label">Trip</span>
      <span class="cell-val" id="trip">0.0 km</span>
    </div>
  </div>
</div>
<script type="module">
import{startTelemetryStream}from'../shared/telemetry.js';
let tripKm=0;
const speedCard=document.querySelector('.card--speed');
startTelemetryStream(d=>{
  document.getElementById('speed').textContent=d.speedKph;
  document.getElementById('rpm').textContent=d.rpm.toLocaleString();
  document.getElementById('gear').textContent=d.gear;
  document.getElementById('fuel-pct').textContent=d.fuelPct;
  document.getElementById('fuel-fill').style.width=d.fuelPct+'%';
  document.getElementById('range').textContent=d.rangeKm;
  tripKm+=(d.speedKph/36000);
  document.getElementById('trip').textContent=tripKm.toFixed(1)+' km';
  // subtle depth effect
  const shadow=Math.min(d.speedKph/2,40);
  speedCard.style.boxShadow=`0 ${4+shadow/4}px ${20+shadow}px rgba(0,0,0,.3)`;
});
</script>
</body>
</html>
