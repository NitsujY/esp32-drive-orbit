<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Concept 9 — Ember Ring</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#0a0604;color:#fff5e6;font-family:'Playfair Display','Georgia','Times New Roman',serif}
body{display:flex;align-items:center;justify-content:center}
.frame{position:relative;width:100vw;height:100vh;overflow:hidden;background:radial-gradient(circle at 50% 45%,rgba(255,100,0,.04),transparent 60%),#0a0604}
canvas{position:absolute;top:0;left:0;width:100%;height:100%}
.center-content{position:absolute;top:46%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;z-index:2}
.ember-speed{font-size:72px;font-weight:400;line-height:1;letter-spacing:-2px;color:#fff5e6;text-shadow:0 0 20px rgba(255,140,50,.2)}
.ember-unit{font-size:12px;letter-spacing:.3em;font-family:-apple-system,sans-serif;color:#b8a898;margin-top:2px}
.ember-line{width:60px;height:1px;background:linear-gradient(90deg,transparent,rgba(255,180,100,.25),transparent);margin:8px auto}
.ember-rpm{font-size:22px;font-weight:400;color:#b8a898;font-family:-apple-system,sans-serif;letter-spacing:-.5px}
.ember-rpm-label{font-size:10px;letter-spacing:.15em;color:#6b5d50;margin-left:4px}
.bottom-bar{position:absolute;bottom:14px;left:0;width:100%;display:flex;justify-content:center;gap:20px;font-size:12px;color:#6b5d50;letter-spacing:.06em;z-index:2;font-family:-apple-system,sans-serif;pointer-events:none}
.gear-ember{font-weight:600;color:#b8a898}
.back-link{position:fixed;top:16px;left:16px;color:rgba(255,200,150,.3);text-decoration:none;font-size:13px;z-index:10;font-family:sans-serif}
.back-link:hover{color:#fff5e6}
</style>
</head>
<body>
<a class="back-link" href="./index.html">&larr; All Concepts</a>
<div class="frame">
  <canvas id="ring" width="960" height="640"></canvas>
  <div class="center-content">
    <div class="ember-speed" id="speed">0</div>
    <div class="ember-unit">km/h</div>
    <div class="ember-line"></div>
    <div>
      <span class="ember-rpm" id="rpm">0</span>
      <span class="ember-rpm-label">rpm</span>
    </div>
  </div>
  <div class="bottom-bar">
    <span class="gear-ember" id="gear">D</span>
    <span><span id="fuel">0</span>% fuel</span>
    <span><span id="range">0</span> km</span>
    <span>trip <span id="trip">0.0</span> km</span>
  </div>
</div>
<script type="module">
import{startTelemetryStream}from'../shared/telemetry.js';
const cvs=document.getElementById('ring');
const ctx=cvs.getContext('2d');
const W=960,H=640,CX=W/2,CY=H/2-16;
const R_OUTER=200,R_INNER=168;
const START=Math.PI*.6,END=Math.PI*2.4;
const MAX_RPM=6000;
let sparks=[];
let flickerPhase=0;

function drawRing(rpm,fuelPct){
  ctx.clearRect(0,0,W,H);
  const frac=Math.min(rpm/MAX_RPM,1);
  const endA=START+(END-START)*frac;
  flickerPhase+=.08;

  // dark track
  ctx.beginPath();ctx.arc(CX,CY,R_OUTER,START,END);
  ctx.arc(CX,CY,R_INNER,END,START,true);ctx.closePath();
  ctx.fillStyle='rgba(255,255,255,.02)';ctx.fill();

  // ember fill
  if(frac>0){
    const grad=ctx.createConicGradient(START,CX,CY);
    grad.addColorStop(0,'#8b0000');
    grad.addColorStop(.3,'#cc3300');
    grad.addColorStop(.6,'#ff6600');
    grad.addColorStop(.85,'#ffaa00');
    grad.addColorStop(1,'#ffcc00');
    ctx.beginPath();ctx.arc(CX,CY,R_OUTER,START,endA);
    ctx.arc(CX,CY,R_INNER,endA,START,true);ctx.closePath();
    ctx.fillStyle=grad;ctx.fill();

    // leading edge glow
    const gx=CX+Math.cos(endA)*((R_OUTER+R_INNER)/2);
    const gy=CY+Math.sin(endA)*((R_OUTER+R_INNER)/2);
    const flicker=.5+Math.sin(flickerPhase)*(.1+frac*.15);
    const gd=ctx.createRadialGradient(gx,gy,0,gx,gy,32);
    gd.addColorStop(0,`rgba(255,220,100,${flicker})`);
    gd.addColorStop(1,'rgba(255,220,100,0)');
    ctx.fillStyle=gd;ctx.fillRect(gx-34,gy-34,68,68);

    // sparks
    if(Math.random()<frac*.4){
      sparks.push({x:gx,y:gy,vx:(Math.random()-.5)*2,vy:-Math.random()*3-1,life:1});
    }
  }

  // draw & update sparks
  sparks=sparks.filter(s=>{
    s.x+=s.vx;s.y+=s.vy;s.vy+=.06;s.life-=.03;
    if(s.life<=0)return false;
    ctx.beginPath();ctx.arc(s.x,s.y,1.5*s.life,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,200,80,${s.life*.7})`;ctx.fill();
    return true;
  });

  // low fuel = cool ring
  if(fuelPct<20){
    ctx.beginPath();ctx.arc(CX,CY,(R_OUTER+R_INNER)/2,START,endA);
    ctx.strokeStyle=`rgba(80,140,220,${(.2-fuelPct/100)})`;ctx.lineWidth=R_OUTER-R_INNER;ctx.stroke();
  }
}

let tripKm=0;
startTelemetryStream(d=>{
  document.getElementById('speed').textContent=d.speedKph;
  document.getElementById('rpm').textContent=d.rpm.toLocaleString();
  document.getElementById('gear').textContent=d.gear;
  document.getElementById('fuel').textContent=d.fuelPct;
  document.getElementById('range').textContent=d.rangeKm;
  tripKm+=(d.speedKph/36000);
  document.getElementById('trip').textContent=tripKm.toFixed(1);
  drawRing(d.rpm,d.fuelPct);
});
</script>
</body>
</html>
