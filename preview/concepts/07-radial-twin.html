<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Concept 7 — Radial Twin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#151515;color:#fff;font-family:'Nunito','Quicksand','Segoe UI',sans-serif}
body{display:flex;align-items:center;justify-content:center}
.frame{position:relative;width:100vw;height:100vh;overflow:hidden;background:#151515;display:flex;flex-direction:column;align-items:center;justify-content:center}
canvas{position:absolute;top:0;left:0;width:100%;height:100%}
.overlay{position:relative;z-index:2;width:100%;pointer-events:none}
.gauges{display:flex;justify-content:center;align-items:center;gap:20px;padding-top:10px}
.gauge-center{text-align:center;width:170px}
.g-val{font-size:52px;font-weight:700;line-height:1;letter-spacing:-2px}
.g-unit{font-size:11px;letter-spacing:.2em;text-transform:uppercase;opacity:.4;margin-top:2px}
.gauge-center--rpm .g-val{color:#f59e0b}
.gauge-center--speed .g-val{color:#00b4d8}
.connector{width:24px;height:2px;background:linear-gradient(90deg,rgba(0,180,216,.3),rgba(245,158,11,.3));border-radius:1px;margin-top:-20px}
.bottom-bar{position:relative;z-index:2;display:flex;justify-content:center;gap:24px;font-size:12px;opacity:.45;margin-top:auto;padding-bottom:16px;letter-spacing:.05em}
.gear-b{font-weight:700;font-size:14px;opacity:.7}
.back-link{position:fixed;top:16px;left:16px;color:rgba(255,255,255,.3);text-decoration:none;font-size:13px;z-index:10}
.back-link:hover{color:#fff}
</style>
</head>
<body>
<a class="back-link" href="./index.html">&larr; All Concepts</a>
<div class="frame">
  <canvas id="dial" width="960" height="640"></canvas>
  <div class="overlay">
    <div class="gauges">
      <div class="gauge-center gauge-center--speed">
        <div class="g-val" id="speed">0</div>
        <div class="g-unit">km/h</div>
      </div>
      <div class="connector"></div>
      <div class="gauge-center gauge-center--rpm">
        <div class="g-val" id="rpm">0</div>
        <div class="g-unit">×1000 rpm</div>
      </div>
    </div>
  </div>
  <div class="bottom-bar">
    <span class="gear-b" id="gear">D</span>
    <span>FUEL <span id="fuel">0</span>%</span>
    <span><span id="range">0</span> km</span>
    <span>TRIP <span id="trip">0.0</span> km</span>
  </div>
</div>
<script type="module">
import{startTelemetryStream}from'../shared/telemetry.js';
const cvs=document.getElementById('dial');
const ctx=cvs.getContext('2d');
const W=960,H=640;
const MAX_SPEED=220,MAX_RPM=6000;
const R=130;
const LCX=W/2-110,RCX=W/2+110,CY=H/2-20;
const START=Math.PI*.65,END=Math.PI*2.35;
let breathPhase=0;

function drawGaugeArc(cx,cy,frac,color,trackColor){
  // track
  ctx.beginPath();ctx.arc(cx,cy,R,START,END);
  ctx.strokeStyle=trackColor;ctx.lineWidth=10;ctx.lineCap='round';ctx.stroke();
  // fill
  if(frac>0){
    const endA=START+(END-START)*frac;
    ctx.beginPath();ctx.arc(cx,cy,R,START,endA);
    ctx.strokeStyle=color;ctx.lineWidth=10;ctx.lineCap='round';ctx.stroke();
    // glow
    ctx.beginPath();ctx.arc(cx,cy,R,START,endA);
    ctx.strokeStyle=color.replace('1)','0.3)').replace(')',',0.3)');
    ctx.lineWidth=20;ctx.stroke();
  }
  // ticks
  for(let i=0;i<=10;i++){
    const a=START+(END-START)*(i/10);
    const c=Math.cos(a),s=Math.sin(a);
    ctx.beginPath();
    ctx.moveTo(cx+c*(R+14),cy+s*(R+14));
    ctx.lineTo(cx+c*(R+6),cy+s*(R+6));
    ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=1;ctx.stroke();
  }
}

function draw(speedFrac,rpmFrac){
  ctx.clearRect(0,0,W,H);
  breathPhase+=.02;
  const breathAlpha=.85+Math.sin(breathPhase)*.03;
  ctx.globalAlpha=breathAlpha;
  drawGaugeArc(LCX,CY,speedFrac,'#00b4d8','rgba(0,180,216,.1)');
  drawGaugeArc(RCX,CY,rpmFrac,'#f59e0b','rgba(245,158,11,.1)');
  // connecting line
  ctx.beginPath();
  ctx.moveTo(LCX+R+18,CY);ctx.lineTo(RCX-R-18,CY);
  const lg=ctx.createLinearGradient(LCX+R,CY,RCX-R,CY);
  lg.addColorStop(0,'rgba(0,180,216,.2)');lg.addColorStop(1,'rgba(245,158,11,.2)');
  ctx.strokeStyle=lg;ctx.lineWidth=1.5;ctx.stroke();
  ctx.globalAlpha=1;
}

let tripKm=0;
startTelemetryStream(d=>{
  document.getElementById('speed').textContent=d.speedKph;
  document.getElementById('rpm').textContent=(d.rpm/1000).toFixed(1);
  document.getElementById('gear').textContent=d.gear;
  document.getElementById('fuel').textContent=d.fuelPct;
  document.getElementById('range').textContent=d.rangeKm;
  tripKm+=(d.speedKph/36000);
  document.getElementById('trip').textContent=tripKm.toFixed(1);
  draw(Math.min(d.speedKph/MAX_SPEED,1),Math.min(d.rpm/MAX_RPM,1));
});
</script>
<script>(function(){var m=new URLSearchParams(location.search).get('mode')||localStorage.getItem('conceptMode')||'dark';if(m==='black'){var s=document.createElement('style');s.textContent='body,.frame,html{background:#000!important}';document.head.appendChild(s);}})();</script>
</body>
</html>
