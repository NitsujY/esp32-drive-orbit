<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Concept 3 — Carbon Digital</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;
  background:#0c0c0c;
  background-image:
    repeating-linear-gradient(45deg,transparent,transparent 2px,rgba(255,255,255,.015) 2px,rgba(255,255,255,.015) 4px),
    repeating-linear-gradient(-45deg,transparent,transparent 2px,rgba(255,255,255,.015) 2px,rgba(255,255,255,.015) 4px);
  background-size:8px 8px;
}
body{display:flex;align-items:center;justify-content:center}
.frame{position:relative;width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.hud-box{
  border:1px solid rgba(255,210,80,.18);
  background:rgba(0,0,0,.65);
  padding:28px 48px 24px;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  position:relative;
}
.hud-box::before,.hud-box::after{
  content:'';position:absolute;width:16px;height:16px;
  border-color:rgba(255,210,80,.45);border-style:solid;
}
.hud-box::before{top:-1px;left:-1px;border-width:2px 0 0 2px}
.hud-box::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0}
.label{
  font-family:'SF Mono','Fira Code','Courier New',monospace;
  font-size:9px;letter-spacing:.4em;text-transform:uppercase;
  color:rgba(255,210,80,.45);margin-bottom:4px;
}
.speed-num{
  font-family:'SF Mono','Fira Code','Courier New',monospace;
  font-size:min(26vw,36vh,130px);font-weight:700;line-height:1;
  letter-spacing:.06em;color:rgba(255,210,80,.9);
  font-variant-numeric:tabular-nums;
  text-shadow:0 0 40px rgba(255,210,80,.2);
}
.unit{
  font-family:'SF Mono','Fira Code',monospace;
  font-size:10px;letter-spacing:.4em;color:rgba(255,210,80,.4);
}
.rpm-bar-wrap{width:min(70vw,260px);margin-top:18px}
.rpm-bar-label{
  display:flex;justify-content:space-between;
  font-family:monospace;font-size:9px;letter-spacing:.25em;
  color:rgba(255,210,80,.35);margin-bottom:4px;
}
.rpm-track{height:5px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.rpm-fill{
  height:100%;border-radius:2px;
  background:linear-gradient(90deg,rgba(255,210,80,.7),rgba(255,100,30,1));
  transition:width .1s linear;
}
.info-row{
  display:flex;gap:28px;margin-top:14px;
  font-family:'SF Mono','Fira Code',monospace;
  font-size:11px;letter-spacing:.12em;color:rgba(255,210,80,.38);
}
.back-link{position:fixed;top:16px;left:16px;color:rgba(255,255,255,.3);
  text-decoration:none;font-size:13px;z-index:10;font-family:sans-serif}
.back-link:hover{color:rgba(255,255,255,.7)}
</style>
</head>
<body>
<a class="back-link" href="./index.html">&larr; All Concepts</a>
<div class="frame">
  <div class="hud-box">
    <div class="label">Speed</div>
    <div class="speed-num" id="speed">000</div>
    <div class="unit">km / h</div>
    <div class="rpm-bar-wrap">
      <div class="rpm-bar-label"><span>RPM</span><span id="rpm">0</span></div>
      <div class="rpm-track"><div class="rpm-fill" id="rpm-fill" style="width:0%"></div></div>
    </div>
    <div class="info-row">
      <span>G <span id="gear">P</span></span>
      <span>FUEL <span id="fuel">0</span>%</span>
      <span>RNG <span id="range">0</span></span>
    </div>
  </div>
</div>
<script type="module">
import { startTelemetryStream } from '../shared/telemetry.js';
startTelemetryStream(d => {
  document.getElementById('speed').textContent = String(d.speedKph).padStart(3, '0');
  document.getElementById('rpm').textContent = d.rpm.toLocaleString();
  document.getElementById('rpm-fill').style.width = Math.min(d.rpm / 6000 * 100, 100) + '%';
  document.getElementById('gear').textContent = d.gear;
  document.getElementById('fuel').textContent = d.fuelPct;
  document.getElementById('range').textContent = d.rangeKm;
});
</script>
<script>(function(){var m=new URLSearchParams(location.search).get('mode')||localStorage.getItem('conceptMode')||'dark';if(m==='black'){var s=document.createElement('style');s.textContent='body,.frame,.hud-box{background:#000!important;background-image:none!important}';document.head.appendChild(s);}})();</script>
</body>
</html>
