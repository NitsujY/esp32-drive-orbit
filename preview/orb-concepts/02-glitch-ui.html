<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <title>Glitch UI</title>
  <style>
    :root { --body-bg:#0c1116; --orb-bg:#07101a; --text-col:#86e6ff; }
    [data-theme="black"] { --body-bg:#000; --orb-bg:#05070b; --text-col:#f6fbff; }
    body { margin:0; background:var(--body-bg); color:var(--text-col); font-family:'Courier New',monospace; display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh; overflow:hidden; gap:16px; transition:background 0.3s; }
    .wrap { position:relative; width:240px; height:240px; background:var(--orb-bg); border-radius:120px; overflow:hidden; box-shadow:inset 0 0 10px rgba(0,0,0,0.8); display:flex; align-items:center; justify-content:center; transition:background 0.3s; }
    canvas { position:absolute; top:0; left:0; z-index:1; }
    .ui { position:absolute; top:0; left:0; width:100%; height:100%; z-index:2; pointer-events:none; }
    .theme-btn { background:rgba(125,249,198,0.1); border:1px solid rgba(125,249,198,0.25); color:var(--text-col); font-family:'Courier New',monospace; font-size:11px; letter-spacing:0.1em; padding:6px 16px; border-radius:999px; cursor:pointer; transition:background 0.2s, border-color 0.2s; }
    .theme-btn:hover { background:rgba(125,249,198,0.2); border-color:rgba(125,249,198,0.5); }
    [data-theme="black"] .theme-btn { background:rgba(255,255,255,0.04); border-color:rgba(255,255,255,0.08); }
  </style>
</head>
<body>
  <div class="wrap">
    <canvas id="c" width="240" height="240"></canvas>
    <div class="ui" id="ui">
      <div id='g' style='position:absolute;top:25%;width:100%;text-align:center;font-size:40px;font-weight:bold;color:#eef6ff;text-shadow:3px 0 0 #ff003c, -3px 0 0 #00f0ff;mix-blend-mode:screen;opacity:0.85'>--:--</div>
    </div>
  </div>
  <button class="theme-btn" id="theme-btn">BLACK</button>
  <div class="weather-chip" style="position:absolute;top:14px;left:50%;transform:translateX(-50%);padding:4px 10px;border-radius:999px;font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:#7a99ad;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08)" id="weather-chip">WiFi / Weather</div>
  <script>
    const ctx = document.getElementById('c').getContext('2d');
    let frame = 0;
    const CX=120, CY=120;
    let isDark = true;

    document.getElementById('theme-btn').addEventListener('click', () => {
      isDark = !isDark;
      document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'black');
      document.getElementById('theme-btn').textContent = isDark ? 'BLACK' : 'DARK';
    });

    function getTelemetry() {
        const d = new Date();
        const hr = String(d.getHours()).padStart(2, '0');
        const min = String(d.getMinutes()).padStart(2, '0');
        const temp = 22 + Math.sin(frame*0.01)*5;
        const hum = 45 + Math.cos(frame*0.015)*15;
        const scenes = ['CLEAR', 'CLOUDY', 'RAIN'];
        return {
          spd: hr + ':' + min,
          trp: temp.toFixed(1),
          gas: Math.max(0, Math.min(1, hum / 100)),
          rng: scenes[Math.floor(frame / 180) % scenes.length],
          lod: Math.max(0, Math.min(1, (temp - 10) / 25)),
          bst: Math.max(0, Math.min(1, (hum - 20) / 60))
        };
      }

    function draw() {
      ctx.clearRect(0,0,240,240);
      let t = getTelemetry();
      const glitchAlpha = isDark ? 0.4 : 0.25;
      if(Math.random()<0.15) {
        ctx.clearRect(0,0,240,240);
        ctx.save(); ctx.translate((Math.random()-0.5)*16, (Math.random()-0.5)*16); ctx.restore();
      }
      if(Math.random()<0.1 && document.getElementById('g'))
        document.getElementById('g').style.transform = `translate(${(Math.random()-0.5)*10}px, ${(Math.random()-0.5)*10}px)`;
      ctx.fillStyle = `rgba(255,0,60,${glitchAlpha})`;
      if(Math.random() < t.lod) ctx.fillRect(20, 100, 20, 40*t.lod);
      if(Math.random() < 0.2) ctx.fillRect(200, 80, 10, 60*t.bst);
      ctx.fillStyle = isDark ? '#fff' : '#1a3a4a';
      ctx.font='bold 40px Arial'; ctx.textAlign='center';
      ctx.fillText(t.spd, CX, CY);
      let gEl = document.getElementById('g');
      if(gEl) gEl.innerText = t.spd;
    }
    setInterval(()=>{ frame++; ctx.save(); draw(); ctx.restore(); }, 33);
  </script>
</body>
</html>
