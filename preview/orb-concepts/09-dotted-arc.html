<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Dotted Arc</title>
  <style>
    body { margin:0; background:#0c1116; color:#86e6ff; font-family:'Courier New',monospace; display:flex; justify-content:center; align-items:center; height:100vh; overflow:hidden; }
    .wrap { position:relative; width:240px; height:240px; background:#07101a; border-radius:120px; overflow:hidden; box-shadow:inset 0 0 10px rgba(0,0,0,0.8); display:flex; align-items:center; justify-content:center; }
    canvas { position:absolute; top:0; left:0; z-index:1; }
    .ui { position:absolute; top:0; left:0; width:100%; height:100%; z-index:2; pointer-events:none; }
  </style>
</head>
<body>
  <div class="wrap">
    <canvas id="c" width="240" height="240"></canvas>
    <div class="ui" id="ui"></div>
  </div>
  <script>
    const ctx = document.getElementById('c').getContext('2d');
    let frame = 0;
    const CX=120, CY=120;
    
    function getTelemetry() {
        let gasLevel = 0.82;
        return {
            lod: Math.abs(Math.sin(frame*0.05)),
            bst: Math.abs(Math.sin(frame*0.1)) * 1.5,
            spd: 75 + Math.floor(Math.sin(frame*0.01)*20),
            gas: gasLevel,
            trp: 12.4 + (frame * 0.005),
            rng: Math.floor(420 * gasLevel)
        };
    }

    function draw() { 
        ctx.clearRect(0,0,240,240); 
        let t = getTelemetry();
        let bstActive = Math.floor(t.bst*10); for(let i=0;i<30;i++){{ let rad = Math.PI + i*(Math.PI/30); ctx.fillStyle = i<Math.floor(t.lod*30) ? '#ff7eb3' : 'rgba(255,255,255,0.1)'; ctx.beginPath(); ctx.arc(CX+Math.cos(rad)*112, CY+Math.sin(rad)*112, 3, 0, 7); ctx.fill(); let rad2 = i*(Math.PI/30); ctx.fillStyle = i<Math.floor(t.gas*30) ? '#49c7ff' : 'rgba(255,255,255,0.1)'; ctx.beginPath(); ctx.arc(CX+Math.cos(rad2)*102, CY+Math.sin(rad2)*102, 2, 0, 7); ctx.fill(); }} ctx.fillStyle='#fff'; ctx.font='bold 40px Arial'; ctx.textAlign='center'; ctx.fillText(t.spd, CX, CY+15); 
    }
    setInterval(()=>{ frame++; ctx.save(); draw(); ctx.restore(); }, 33);
  </script>
</body>
</html>
