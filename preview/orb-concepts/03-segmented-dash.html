<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Segmented Dash</title>
  <style>
    body { margin:0; background:#0c1116; color:#86e6ff; font-family:'Courier New',monospace; display:flex; justify-content:center; align-items:center; height:100vh; overflow:hidden; }
    .wrap { position:relative; width:240px; height:240px; background:#07101a; border-radius:120px; overflow:hidden; box-shadow:inset 0 0 10px rgba(0,0,0,0.8); display:flex; align-items:center; justify-content:center; }
    canvas { position:absolute; top:0; left:0; z-index:1; }
    .ui { position:absolute; top:0; left:0; width:100%; height:100%; z-index:2; pointer-events:none; }
  </style>
</head>
<body>
  <div class="wrap">
    <canvas id="c" width="240" height="240"></canvas>
    <div class="ui" id="ui"></div>
  </div>
  <script>
    const ctx = document.getElementById('c').getContext('2d');
    let frame = 0;
    const CX=120, CY=120;
    
    function getTelemetry() {
        let gasLevel = 0.82;
        return {
            lod: Math.abs(Math.sin(frame*0.05)),
            bst: Math.abs(Math.sin(frame*0.1)) * 1.5,
            spd: 75 + Math.floor(Math.sin(frame*0.01)*20),
            gas: gasLevel,
            trp: 12.4 + (frame * 0.005),
            rng: Math.floor(420 * gasLevel)
        };
    }

    function draw() { 
        ctx.clearRect(0,0,240,240); 
        let t = getTelemetry();
        ctx.lineWidth=8; ctx.strokeStyle='#ff7eb3'; ctx.setLineDash([8, 6]); ctx.beginPath(); ctx.arc(CX, CY, 110, Math.PI, Math.PI + Math.PI * t.lod*1.5); ctx.stroke(); ctx.lineWidth=4; ctx.strokeStyle='#49c7ff'; ctx.setLineDash([4, 4]); ctx.beginPath(); ctx.arc(CX, CY, 98, Math.PI, Math.PI + Math.PI * t.gas); ctx.stroke(); ctx.strokeStyle='#ffaa00'; ctx.beginPath(); ctx.arc(CX, CY, 98, 0, Math.PI * (t.bst/1.5)); ctx.stroke(); ctx.setLineDash([]); ctx.fillStyle='#fff'; ctx.font='bold 40px Arial'; ctx.textAlign='center'; ctx.fillText(t.spd, CX, CY+15); 
    }
    setInterval(()=>{ frame++; ctx.save(); draw(); ctx.restore(); }, 33);
  </script>
</body>
</html>
