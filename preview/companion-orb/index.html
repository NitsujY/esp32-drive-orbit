<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Orb — Independent OBD2 Display</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <h2>Orb — Direct OBD2 Preview</h2>
  <div class="wrap">
    <div class="canvas-container">
      <canvas id="orb" width="240" height="240" aria-label="Orb display"></canvas>
      <div class="telemetry-overlay">
        <div class="speed-display">
          <span class="speed-value" id="speedValue">0</span><span class="speed-unit">km/h</span>
        </div>
        <div class="rpm-display">
          <span class="rpm-value" id="rpmValue">0</span><span class="rpm-unit">rpm</span>
        </div>
      </div>
    </div>
    <div class="controls">
      <fieldset>
        <legend>Telemetry Simulation</legend>
        <label>Speed (km/h) <input id="speed" type="range" min="0" max="200" value="0" step="5"></label>
        <label>RPM <input id="rpm" type="range" min="0" max="7000" value="0" step="100"></label>
        <label>Fuel Level (%) <input id="fuel" type="range" min="0" max="100" value="60" step="5"></label>
      </fieldset>

      <fieldset>
        <legend>Pet Behavior</legend>
        <label>Mood
          <select id="mood">
            <option value="0">Neutral</option>
            <option value="1">Warm</option>
            <option value="2">Alert</option>
            <option value="3">Happy</option>
            <option value="4">Sad</option>
            <option value="5">Excited</option>
          </select>
        </label>
        <label><input id="sleep" type="checkbox"> Sleeping</label>
        <label>XP Progress <input id="progress" type="range" min="0" max="100" value="30"></label>
      </fieldset>

      <fieldset>
        <legend>Drive Mode</legend>
        <label><input type="radio" name="driveMode" value="chill" checked> Chill</label>
        <label><input type="radio" name="driveMode" value="sport"> Sport</label>
      </fieldset>

      <div class="note">
        <strong>Orb Display:</strong> Shows speed/RPM with pet tamagotchi overlay.
        <br><strong>Connection:</strong> Direct ELM327/OBD2 → ESP32-C3 via UART.
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
