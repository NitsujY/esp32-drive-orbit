[platformio]
default_envs = dash_35

[env]
platform = espressif32
framework = arduino
board = esp32dev
monitor_speed = 115200
upload_speed = 921600
build_flags =
  -Wall
  -Wextra
  -DCORE_DEBUG_LEVEL=3

[env:dash_35]
build_src_filter =
  -<*>
  +<dash_35/*.cpp>
  +<dash_35/**/*.cpp>
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
lib_deps =
  https://github.com/moononournation/Arduino_GFX.git#v1.6.0
  https://github.com/RobTillaart/TCA9554.git
build_flags =
  ${env.build_flags}
  -DBOARD_HAS_PSRAM
  -mfix-esp32-psram-cache-issue

[env:companion_orb]
; Temporary build target for the placeholder orb firmware on Apple Silicon.
; Restore an ESP32-C3 board definition when the local RISC-V toolchain issue is resolved.
board = esp32dev
build_src_filter =
  -<*>
  +<companion_orb/*.cpp>
  +<companion_orb/**/*.cpp>
