[platformio]
default_envs = dash_35

[env]
platform = espressif32
framework = arduino
board = esp32dev
monitor_speed = 115200
upload_speed = 921600
build_flags =
  -Wall
  -Wextra
  -DCORE_DEBUG_LEVEL=3

[env:dash_35]
build_src_filter =
  -<*>
  +<dash_35/*.cpp>
  +<dash_35/**/*.cpp>
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
lib_deps =
  https://github.com/moononournation/Arduino_GFX.git#v1.6.0
  https://github.com/RobTillaart/TCA9554.git
  olikraus/U8g2@^2.36.9
  bblanchon/ArduinoJson@^7.1.0
build_flags =
  ${env.build_flags}
  -DBOARD_HAS_PSRAM
  -mfix-esp32-psram-cache-issue

[env:companion_orb]
board = esp32-c3-devkitm-1
platform_packages =
  toolchain-riscv32-esp@8.4.0+2021r2-patch5
lib_deps =
  https://github.com/moononournation/Arduino_GFX.git#v1.6.0
build_flags =
  ${env.build_flags}
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
build_src_filter =
  -<*>
  +<companion_orb/*.cpp>
  +<companion_orb/**/*.cpp>
